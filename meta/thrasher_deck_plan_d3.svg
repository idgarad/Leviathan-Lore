<svg viewBox="0 0 1200 850" xmlns="http://www.w3.org/2000/svg">
  <style>
    .scu-h { fill: #2980b9; stroke: #154360; stroke-width: 1.5; opacity: 0.9; }
    .scu-v { fill: #3498db; stroke: #154360; stroke-width: 1.5; opacity: 0.9; }
    .cmd   { fill: #f1c40f; stroke: #9a7d0a; stroke-width: 1.5; }
    .eng   { fill: #c0392b; stroke: #641e16; stroke-width: 1.5; }
    .lift  { fill: #9b59b6; stroke: #4a235a; stroke-width: 1.5; }
    .hull { fill: none; stroke: #444; stroke-width: 2; stroke-dasharray: 4; }
    .service-void { fill: #111; stroke: #222; stroke-width: 0.5; }
    .text { fill: #ccc; font-family: sans-serif; font-size: 10px; }
    .logistics { stroke: #00ff00; stroke-width: 3; stroke-dasharray: 8,4; opacity: 0.4; fill: none; }
    .door { stroke: #50e3c2; stroke-width: 4; fill: none; }
    .label { fill: white; font-family: sans-serif; font-size: 12px; font-weight: bold; }
  </style>
  
  <rect width="1200" height="700" fill="#050505" />
  
  <!-- LEGEND -->
  <g transform="translate(30, 30)">
    <text x="0" y="0" fill="white" font-family="sans-serif" font-weight="bold" font-size="18">USO DECK PLAN: THRASHER CLASS (DECK 3 - PRIMARY OPS)</text>
    <rect x="0" y="25" width="15" height="15" class="cmd" /> <text x="25" y="38" fill="#ccc" font-size="12">Command (Lateral Orientation)</text>
    <rect x="0" y="50" width="15" height="15" class="scu-h" /> <text x="25" y="63" fill="#ccc" font-size="12">Hallway/Habitat (Longitudinal)</text>
    <rect x="0" y="75" width="15" height="15" fill="#050505" stroke="#444" /> <text x="25" y="88" fill="#ccc" font-size="12">Service Void (1m Equipment Gaps)</text>
    <text x="0" y="105" fill="#50e3c2" font-size="12" font-weight="bold">Reclaimed Space: No internal margins in bundled SCUs (Ref 102.16)</text>
  </g>

  <!-- SCALE: 1m = 4px. 
       SCU (Horizontal): 72px (18m) x 24px (6m)
       SCU (Vertical):   24px (6m) x 72px (18m)
       Gap (Buffer): 4px (1m) 
  -->
  <g transform="translate(50, 280)">
    
    <!-- ESH ENVELOPE -->
    <path d="M 0,0 L 240,0 L 240,80 L 800,80 L 800,0 L 1000,0 L 1000,350 L 800,350 L 800,270 L 240,270 L 240,350 L 0,350 Z" class="hull" />
    <text x="10" y="370" class="text" opacity="0.5">ESH ENVELOPE (226m) | NHS VOID BUFFER (102.54C)</text>

    <!-- AFT: ENGINEERING CITADEL -->
    <!-- Bundled Industrial core - internal margins reclaimed -->
    <g transform="translate(40, 110)">
        <!-- Consolidated FTL/CDAP block -->
        <rect x="0" y="0" width="24" height="72" class="eng" />
        <rect x="24" y="24" width="72" height="24" class="eng" />
        <rect x="96" y="0" width="24" height="72" class="eng" />
        <text x="12" y="-10" class="text" text-anchor="middle">FTL-A</text>
        <text x="76" y="60" class="text" text-anchor="middle">CDAP-1</text>
        <text x="108" y="-10" class="text" text-anchor="middle">FTL-B</text>
        <text x="60" y="85" class="text" text-anchor="middle" fill="#c0392b" font-weight="bold">CONSOLIDATED ENGINEERING (REF 102.14)</text>
    </g>

    <!-- MID: MAIN TRANSIT SPINE -->
    <g transform="translate(260, 160)">
        <!-- Contiguous Hallway - No internal gaps where doors intersect -->
        <rect x="0" y="0" width="360" height="24" class="scu-h" />
        <path d="M 72,0 V 24 M 144,0 V 24 M 216,0 V 24 M 288,0 V 24" stroke="#154360" stroke-width="0.5" stroke-dasharray="2" />
        <text x="190" y="16" class="label" text-anchor="middle" opacity="0.6">CENTRAL AVENUE</text>

        <!-- LATERAL BRANCH: COMMAND CORE (North) -->
        <!-- Contiguous bundle - Interior space reclaimed -->
        <g transform="translate(72, -72)">
            <rect x="0" y="0" width="72" height="72" class="cmd" />
            <path d="M 24,0 V 72 M 48,0 V 72" stroke="#9a7d0a" stroke-width="0.5" stroke-dasharray="2" />
            <text x="36" y="40" class="label" fill="black" text-anchor="middle">PRIMARY BRIDGE</text>
            <text x="36" y="52" class="text" fill="black" font-size="7" text-anchor="middle">(CONSOLIDATED)</text>
        </g>

        <!-- LATERAL BRANCH: SICK BAY (South) -->
        <!-- Contiguous bundle -->
        <g transform="translate(216, 24)">
            <rect x="0" y="0" width="48" height="72" class="scu-v" />
            <path d="M 24,0 V 72" stroke="#154360" stroke-width="0.5" stroke-dasharray="2" />
            <text x="24" y="40" class="text" fill="white" text-anchor="middle" font-size="8">MED-BAY</text>
        </g>

        <!-- VERTICAL ACCESS (LIFT) -->
        <rect x="0" y="24" width="24" height="24" class="lift" />
        <text x="12" y="40" class="text" text-anchor="middle" fill="white" font-size="6">LIFT</text>
    </g>

    <!-- FORE: HAMMERHEAD OPERATIONS -->
    <g transform="translate(800, 50)">
        <!-- Contiguous Tactical Stack -->
        <rect x="0" y="0" width="24" height="288" class="scu-v" />
        <path d="M 0,72 H 24 M 0,144 H 24 M 0,216 H 24" stroke="#154360" stroke-width="0.5" stroke-dasharray="2" />
        
        <text x="-10" y="144" class="text" transform="rotate(-90, -10, 144)" text-anchor="middle">TACTICAL ARRAY</text>

        <!-- Branching Forward Sensors -->
        <rect x="24" y="132" width="72" height="24" class="scu-h" />
        <text x="60" y="147" class="text" text-anchor="middle">PROBE CTL</text>
    </g>

    <!-- UTILITY TRUNKS (Diegetic wiring runs in gaps) -->
    <g stroke="#ff3300" stroke-width="1" opacity="0.3" fill="none">
        <path d="M 140,140 H 260 V 170 H 800" />
        <text x="270" y="165" class="text" fill="#ff3300" font-size="7">MAIN POWER BUS (EXTERNAL MARGIN RUN)</text>
    </g>

    <!-- NAVIGATION MARKER -->
    <g transform="translate(420, 172)">
        <circle r="4" fill="#e74c3c" />
        <path d="M 0,0 L 20,40" stroke="#e74c3c" />
        <text x="25" y="50" fill="#e74c3c" font-weight="bold" font-size="12">YOU ARE HERE</text>
    </g>
  </g>

  <!-- DECK NAVIGATOR -->
  <g transform="translate(1000, 30)">
    <rect width="150" height="150" fill="#111" stroke="#333" />
    <text x="10" y="20" fill="#666" font-size="12" font-weight="bold">DECK INDEX</text>
    <g font-size="10">
        <text x="10" y="45" fill="#333">D1: SENSOR MAST</text>
        <text x="10" y="65" fill="#333">D2: UPPER HABITAT</text>
        <text x="10" y="85" fill="#fff" font-weight="bold">D3: PRIMARY OPS [X]</text>
        <text x="10" y="105" fill="#333">D4: HABITAT (BERTHING)</text>
        <text x="10" y="125" fill="#333">D5: CARGO/LOGISTICS</text>
    </g>
  </g>

  <!-- BUILDING CODE REFERENCES -->
  <g transform="translate(30, 680)" class="text" font-size="9">
    <text x="0" y="0">Ref 102.5: Standard Corridor Unit (6x6x18m)</text>
    <text x="0" y="15">Ref 102.5A: 1m External Buffer maintained around the habitat skin</text>
    <text x="0" y="30">Ref 102.16: Space Reclamation (Internal margins removed at fused interfaces)</text>
    <text x="300" y="0">Ref 102.14: Consolidated Habitat Bundling (Lateral Array)</text>
    <text x="300" y="15">Ref 103.6A: Protected Core Bridge Doctrine</text>
  </g>

  <!-- FOOTER -->
  <text x="600" y="730" fill="#444" font-size="10" text-anchor="middle">CERTIFIED USO BUILD 102.64 | UNIT-ID: ISC-THR-772 | CONSOLIDATED DECK SCHEMATIC D3 | MATH HOLDS</text>

</svg>